<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주차관리</title>

  <!-- iOS PWA 필수 설정 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="주차관리">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- 출처 헤더 제거 (서버 Referer 차단 우회) -->
  <meta name="referrer" content="no-referrer">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a73e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .logo span {
      font-size: 60px;
      font-weight: 900;
      color: #1a73e8;
    }
    .title {
      color: white;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .status {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo"><span>P</span></div>
  <div class="title">주차관리</div>
  <div class="status">자동 로그인 중...</div>
  <div class="spinner"></div>

  <script>
    // 로그인 페이지로 직접 이동 (단축어 자동화가 나머지 처리)
    setTimeout(function() {
      window.location.href = 'http://mitower.iptime.org/WDC/login.jsp';
    }, 500);
  </script>
</body>
</html>
